id: "FUNC-004"
name: "多工具串联-天气加穿搭"
category: functional
description: "验证 Agent 能正确处理 weather + knowledge 多工具串联场景"
input: "北京今天多少度？35度穿什么衣服合适？"
expected:
  tool_sequence: ["weather", "knowledge"]
  tool_calls:
    - tool: "weather"
      params:
        city: "北京"
    - tool: "knowledge"
      params:
        query: "35度穿什么"
  final_answer_contains: ["北京"]
  max_rounds: 3
assertions:
  check_final_answer: true
  check_tool_sequence: true
  check_tool_params: true
  check_max_rounds: true
tags: ["multi-tool", "weather", "knowledge", "highlight"]
