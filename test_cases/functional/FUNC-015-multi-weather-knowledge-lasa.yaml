id: "FUNC-015"
name: "多工具串联-拉萨天气加穿搭"
category: functional
description: "变体：拉萨天气 + 穿搭建议"
input: "拉萨今天多少度？35度穿什么衣服？"
expected:
  tool_sequence: ["weather", "knowledge"]
  tool_calls:
    - tool: "weather"
      params: { city: "拉萨" }
    - tool: "knowledge"
      params: { query: "35度穿什么" }
  final_answer_contains: ["拉萨"]
  max_rounds: 3
assertions:
  check_final_answer: true
  check_tool_sequence: true
  check_tool_params: true
tags: ["multi-tool", "weather", "knowledge"]
