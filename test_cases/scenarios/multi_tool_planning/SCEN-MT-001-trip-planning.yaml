id: SCEN-MT-001
name: 场景-旅行规划
category: functional
scene: customer_service
difficulty: hard
priority: P0
description: 多工具串联——先查天气再判断穿搭。tool_calls为参考轨迹，LLM可能合理变化
input: 我明天要去北京出差，北京明天什么天气？我需要带什么衣服？
expected:
  tool_sequence:
  - weather
  - knowledge
  max_rounds: 3
  final_answer_contains:
  - 北京
  - 度
  tool_calls:
  - tool: weather
    params:
      city: 参考城市名见input
  - tool: knowledge
    params:
      query: 参考查询词见input
assertions:
  check_final_answer: true
  check_tool_sequence: true
  check_tool_params: false
tags:
- scenarios
- multi-tool
- planning
- P0
requires_llm: true
requires_llm_reason: 场景用例需要LLM语义理解
