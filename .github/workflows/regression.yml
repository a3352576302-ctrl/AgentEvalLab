name: Agent Regression Test

on:
  push:
    paths:
      - 'test_cases/**'
      - 'agentevallab/**'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'test_cases/**'
      - 'agentevallab/**'
      - 'tests/**'
  schedule:
    - cron: '0 2 * * *'  # 每日凌晨 2 点（北京时间 10:00）自动回归
  workflow_dispatch:      # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试
        run: |
          pytest tests/ \
            --junitxml=reports/junit.xml \
            --html=reports/report.html \
            --self-contained-html \
            -v

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

      - name: 测试摘要
        if: always()
        run: |
          echo "::group::测试结果"
          cat reports/junit.xml | head -1
          echo "::endgroup::"
